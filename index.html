<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RJ's Sports Bar & Grill — Portage, Michigan</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Bebas+Neue&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

  <style>
    :root{
      --amber:#D4841A;
      --amber-lt:#F0A832;
      --cream:#F5EDD8;
      --dark:#0E0D0A;
      --mid:#2A2620;
      --smoke:#5C5448;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Lora',serif;background:var(--dark);color:var(--cream)}
    html{scroll-behavior:smooth}

    nav{
      position:fixed;top:0;left:0;width:100%;z-index:100;
      display:flex;justify-content:space-between;align-items:center;
      padding:1rem 2rem;background:rgba(14,13,10,.9)
    }
    .nav-logo{font-family:'Bebas Neue';color:var(--amber-lt);font-size:2rem;text-decoration:none}
    .nav-links{display:flex;gap:1rem;list-style:none}
    .nav-links a{color:var(--cream);text-decoration:none;font-size:.8rem;opacity:.8}

    section{padding:5rem 1.5rem}
    .title{font-size:2.2rem;text-align:center;margin-bottom:2rem}

    /* HERO */
    #hero{height:90vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
    .hero-title{font-size:3.5rem}
    .hero-sub{opacity:.7;margin-top:1rem}

    /* STICKY CTA MOBILE */
    .sticky-bar{
      position:fixed;bottom:0;left:0;width:100%;
      display:none;
      background:var(--dark);
      border-top:1px solid rgba(212,132,26,.3);
      z-index:999;
    }
    .sticky-bar a{
      flex:1;text-align:center;padding:1rem;
      text-decoration:none;font-weight:bold;
      font-size:.9rem;
    }
    .call{background:var(--amber);color:var(--dark)}
    .order{background:var(--mid);color:var(--cream)}

    /* GALLERY */
    .gallery{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:.8rem;
      max-width:1100px;
      margin:auto
    }
    .gallery img{
      width:100%;height:260px;object-fit:cover;border-radius:10px
    }

    /* MENU */
    .menu{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:1rem;
      max-width:1100px;margin:auto
    }
    .item{
      background:var(--mid);
      border-radius:10px;
      overflow:hidden;
      border:1px solid rgba(212,132,26,.2)
    }
    .item img{width:100%;height:160px;object-fit:cover}
    .item-content{padding:1rem}
    .item h3{color:var(--amber-lt)}
    .item p{opacity:.7;font-size:.85rem;margin-top:.5rem}

    /* REVIEWS LIVE PLACEHOLDER */
    .reviews{
      max-width:900px;margin:auto
    }
    .review{
      background:var(--mid);
      padding:1rem;
      margin-bottom:1rem;
      border-radius:10px
    }

    @media(max-width:768px){
      .gallery{grid-template-columns:1fr}
      .sticky-bar{display:flex}
    }
  </style>
</head>

<body>

<nav>
  <a class="nav-logo" href="#hero">RJ's</a>
  <ul class="nav-links">
    <li><a href="#gallery">Gallery</a></li>
    <li><a href="#menu">Menu</a></li>
    <li><a href="#reviews">Reviews</a></li>
  </ul>
</nav>

<section id="hero">
  <h1 class="hero-title">RJ's Sports Bar</h1>
  <p class="hero-sub">Portage, Michigan</p>
</section>

<section>
  <h2 class="title">Real Inside RJ's</h2>
  <div class="gallery">
    <img src="rjs1.jpg" />
    <img src="rjs2.jpg" />
    <img src="rjs3.jpg" />
    <img src="rjs4.jpg" />
    <img src="rjs5.jpg" />
    <img src="rjs6.jpg" />
  </div>
</section>

<section id="menu">
  <h2 class="title">Menu Hits</h2>
  <div class="menu">
    <div class="item">
      <img src="burger.jpg" />
      <div class="item-content">
        <h3>RJ Burger</h3>
        <p>Double patty fresh grind. Built messy. Built right.</p>
      </div>
    </div>
    <div class="item">
      <img src="wings.jpg" />
      <div class="item-content">
        <h3>Wings</h3>
        <p>Crispy, sauced, no games.</p>
      </div>
    </div>
    <div class="item">
      <img src="fries.jpg" />
      <div class="item-content">
        <h3>Loaded Fries</h3>
        <p>Hot, salty, gone in seconds.</p>
      </div>
    </div>
  </div>
</section>

<section id="reviews">
  <h2 class="title">Live Reviews</h2>
  <div class="reviews" id="reviewsBox"></div>
</section>

<!-- STICKY MOBILE BAR -->
<div class="sticky-bar">
  <a class="order" href="#menu">Order Food</a>
  <a class="call" href="tel:+12693239262">Call Now</a>
</div>

<script>
// Fake Google Reviews hook (replace with real API key later)
async function loadReviews(){
  const box=document.getElementById('reviewsBox');

  const sample=[
    "Best burger spot in Portage. No debate.",
    "Game nights here hit different.",
    "Wings are insane, drinks cold every time."
  ];

  sample.forEach(r=>{
    const div=document.createElement('div');
    div.className='review';
    div.innerText=r;
    box.appendChild(div);
  });
}
loadReviews();
</script>

</body>
</html>
